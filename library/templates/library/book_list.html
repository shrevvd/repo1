{% extends 'library/base.html' %}

{% block content %}
<table style="width: 100%; border-collapse: collapse; text-align: left;">
    <thead>
        <tr style="background: #f2ede4; border-bottom: 2px solid #e4dacb;">
            <th style="padding: 10px;">ID</th>
            <th>Название</th>
            <th>Автор</th>
            <th>Год</th>
            <th>ISBN</th>
            <th style="text-align: right; padding-right: 10px;">Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for book in books %}
        <tr style="border-bottom: 1px solid #e4dacb;">
            <td style="padding: 10px;">{{ book.id }}</td>
            <td style="font-weight: bold;">{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.publication_year }}</td>
            <td><code>{{ book.isbn }}</code></td>
            <td style="text-align: right; padding-right: 10px; display: flex; gap: 15px; justify-content: flex-end;">
                <a href="{% url 'book_update' book.id %}" style="border-bottom-color: #000;">Изменить</a>
                <a href="{% url 'book_delete' book.id %}" style="color: #b91c1c; border-bottom-color: #b91c1c;">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
