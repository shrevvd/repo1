<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Библиотека{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark p-4">
    <div class="container">
        <h1 class="mb-4">Каталог книг</h1>
        
        <div class="nav d-flex gap-3 mb-4 pb-2 border-bottom">
            <a href="{% url 'book_list' %}" class="text-decoration-none text-dark border-bottom border-dark pb-1">Каталог</a>
            <a href="{% url 'book_add' %}" class="text-decoration-none text-dark border-bottom border-dark pb-1">Добавить запись</a>
        </div>
        
        {% block content %}{% endblock %}
    </div>
    <script src="https://jsdelivr.net"></script>
</body>
</html>
